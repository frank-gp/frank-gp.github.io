        const mainFunction1 = async () => {

        };

        const mainFunction2 = async () => {
          main.innerHTML = await fetch(`${pathName}.html?${Date.now()}`).then(
            (data) => data.text()
          );
        };

        if (pathName === "/") {
          mainFunction();
        } else if (pathName === "/index.html") {
          mainFunction1();
        } else {
          mainFunction2();
        }
